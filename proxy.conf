server {
    listen 80;
    server_name amator.tr www.amator.tr;

    # PATH TRAVERSAL: block encoded dots, null bytes, double encoding
    if ($request_uri ~* "(\.\.|%2e%2e|%252e|%00|%0a|%0d)") {
        return 403;
    }

    # BLOCK: dot files
    location ~ /\. {
        return 404;
    }

    location / {
        proxy_pass http://web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name cagri.amator.tr;

    # PATH TRAVERSAL: block encoded dots, null bytes, double encoding
    if ($request_uri ~* "(\.\.|%2e%2e|%252e|%00|%0a|%0d)") {
        return 403;
    }

    # BLOCK: dot files
    location ~ /\. {
        return 404;
    }

    # BLOCK: sensitive paths
    location ~* ^/(data|migrations|scripts|node_modules|\.env|package\.json|Dockerfile|docker-compose) {
        return 404;
    }

    location / {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $remote_addr;
    }
}

server {
    listen 80 default_server;
    server_name _;
    return 444;
}
