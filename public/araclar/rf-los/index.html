/* =============================================
   rflos Panel Theme Overrides — amator.tr
   ============================================= */

/* Control Panel (sol panel) */
.control-panel {
  background: var(--surface) !important;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4) !important;
  border: 1px solid var(--border) !important;
}

  border-bottom-color: var(--accent) !important;
}
.panel-header h2 {
  color: var(--text) !important;
}

  background: var(--surface-2) !important;
}
.point-header {
  border-bottom-color: var(--border) !important;
}

/* Section headers */
.section-header h3 {
  color: var(--text) !important;
}

/* RF Section & LOS Selector */
.rf-section {
  background: color-mix(in srgb, var(--accent) 8%, var(--surface)) !important;
  border-color: var(--accent) !important;
}
.rf-section h3 {
  color: var(--accent) !important;
}
.los-selector-section {
  background: color-mix(in srgb, var(--accent) 8%, var(--surface)) !important;
  border-color: var(--accent) !important;
}
.los-selector-section h3 {
  color: var(--accent) !important;
}
.frequency-selector label,
.selector-group label {
  color: var(--text-muted) !important;
}

/* Import dialog */
.import-dialog {
  background: var(--surface-2) !important;
}

/* Input group labels */
.input-group label {
  color: var(--text-muted) !important;
}
.height-input-row label {
  color: var(--text-muted) !important;
}
.loading {
  color: var(--text-muted) !important;
}

/* LOS Panel (sag alt panel) */
.los-panel {
  background: var(--surface) !important;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4) !important;
  border: 1px solid var(--border) !important;
}
.los-header {
  border-bottom-color: var(--accent) !important;
}
.los-header h3 {
  color: var(--text) !important;
}
.los-detail {
  color: var(--text-muted) !important;
}
.los-info {
  color: var(--text) !important;
}

/* LOS status badges */
.los-clear {
  background: color-mix(in srgb, var(--success) 15%, var(--surface)) !important;
  color: var(--success) !important;
}
.los-blocked {
  background: color-mix(in srgb, var(--error) 15%, var(--surface)) !important;
  color: var(--error) !important;
}
.los-horizon {
  background: color-mix(in srgb, var(--warning) 15%, var(--surface)) !important;
  color: var(--warning) !important;
}

/* Inputs */
.input-base, .input-regular, .input-data, .input-name, .input-compact {
  background-color: var(--surface-2) !important;
  color: var(--text) !important;
  border-color: var(--border) !important;
}
.input-base:focus, .input-regular:focus, .input-data:focus, .input-name:focus, .input-compact:focus {

  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent) !important;
}
.input-data::placeholder, .input-compact::placeholder {

}

/* Select dropdowns */
.select-base, .select-unit {

  border-color: var(--border) !important;
}

}
.select-unit option {

  color: var(--text) !important;
}

/* Textarea */
.textarea-base {
  background-color: var(--surface-2) !important;
  color: var(--text) !important;
  border-color: var(--border) !important;
}
.textarea-base:focus {

}

/* Unit label */
.unit-label {
  background: var(--surface-2) !important;
  border-color: var(--border) !important;
  color: var(--text-muted) !important;
}

}

}

/* Buttons — danger */

}

/* Buttons — success */
.btn-success {
  background: color-mix(in srgb, var(--success) 12%, var(--surface)) !important;
  border-color: var(--success) !important;
  color: var(--success) !important;
}
.btn-success:hover {
  background: color-mix(in srgb, var(--success) 20%, var(--surface)) !important;
}

.btn-neutral {
  background: var(--surface-2) !important;
  border-color: var(--border) !important;
  color: var(--text) !important;
}
.btn-neutral:hover {

}

  border-color: var(--border) !important;
  color: var(--text-muted) !important;

.btn-freq-default.active {

}

}

.btn-cancel-solid:hover {

.settings-section {

}

  color: var(--text) !important;

}

}

}

}

}

}

}

}

.chart-container {

.leaflet-popup-content-wrapper {
