server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # PATH TRAVERSAL: block encoded dots, null bytes, double encoding
    if ($request_uri ~* "(\.\.|%2e%2e|%252e|%00|%0a|%0d)") {
        return 403;
    }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # BLOCK: dot files (.env, .git, .gitignore, .htaccess etc.)
    location ~ /\. {
        return 404;
    }

    # BLOCK: sensitive files
    location ~* (\.sql|\.db|\.sh|\.log|Dockerfile|docker-compose|package\.json|package-lock|node_modules|\.env) {
        return 404;
    }

    # cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # try file, then directory, then 404
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;

    # security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
